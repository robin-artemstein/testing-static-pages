<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tailwind CDN Example</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-100 m-2">
  <div class="fixed inset-0 z-50 flex flex-col space-y-4 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-blue-300 shadow-lg shadow-gray-400 p-4 rounded-xl">
    <div class="flex flex-col">
        <div class="font-medium text-black text-lg"Please tell us your email address, and we will notify you by email as soon as the product is restocked, thank you for your patience.></div>
        <form>
            <input className="bg-white rounded-full border border-gray-700 text-gray-700 py-2 px-4" type="email" id="email" name="email" value="otux@master.yles.tc.edu.tw" placeholder="Your email address"/>
            <button className="bg-blue-700 rounded-full border border-gray-700 text-white py-3 px-3 m-1" type="submit">Submit...</button>
        </form>
    </div>
  </div>
</body>
</html>
